<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-src 'none'; object-src 'none';">
    <title>SheetJS CSP Test</title>
</head>
<body>
    <h1>SheetJS CSP Test</h1>
    <p id="status">Testing...</p>
    <button id="exportBtn" disabled>Export XLSX</button>
    <button id="importBtn" disabled>Import XLSX</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">

    <script type="module">
        import * as XLSX from './lib/xlsx.mjs';

        const status = document.getElementById('status');
        const exportBtn = document.getElementById('exportBtn');
        const importBtn = document.getElementById('importBtn');
        const fileInput = document.getElementById('fileInput');

        // Test 1: Library loaded?
        if (XLSX && XLSX.utils) {
            status.textContent = 'PASS: SheetJS loaded successfully (v' + XLSX.version + ')';
            status.style.color = 'green';
            exportBtn.disabled = false;
            importBtn.disabled = false;
        } else {
            status.textContent = 'FAIL: SheetJS not loaded';
            status.style.color = 'red';
        }

        // Test 2: XLSX export
        exportBtn.addEventListener('click', () => {
            try {
                const wb = XLSX.utils.book_new();
                const data = [
                    ['Date', 'Task', 'Hours'],
                    ['2026-02-22', 'Test task', 8],
                    ['2026-02-23', 'Another task', 4]
                ];
                const ws = XLSX.utils.aoa_to_sheet(data);
                XLSX.utils.book_append_sheet(wb, ws, 'Test');
                XLSX.writeFile(wb, 'test-output.xlsx');
                exportBtn.textContent = 'Export XLSX - PASS';
                exportBtn.style.color = 'green';
            } catch (e) {
                exportBtn.textContent = 'Export XLSX - FAIL: ' + e.message;
                exportBtn.style.color = 'red';
                console.error(e);
            }
        });

        // Test 3: XLSX import
        importBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const wb = XLSX.read(evt.target.result, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(ws);
                    importBtn.textContent = 'Import XLSX - PASS (' + json.length + ' rows)';
                    importBtn.style.color = 'green';
                    console.log('Imported data:', json);
                } catch (e) {
                    importBtn.textContent = 'Import XLSX - FAIL: ' + e.message;
                    importBtn.style.color = 'red';
                    console.error(e);
                }
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
