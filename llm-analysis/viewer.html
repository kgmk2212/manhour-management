<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI分析ビューア</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7F6F3; --surface: #FFFFFF; --surface-elevated: #FAFAF8;
            --surface-sunken: #F0EEEA; --border: #E7E5E0; --border-light: #EEEDEA;
            --text-primary: #1A1814; --text-secondary: #6B6560; --text-muted: #9C9690;
            --accent: #2D5A27; --accent-light: #EBF5EA; --danger: #B91C1C;
            --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
            --shadow-md: 0 2px 8px rgba(26,24,20,0.06); --transition: 180ms ease;
            --ai-accent: #1D6FA5; --ai-accent-light: #EFF6FF;
            --ai-accent-muted: rgba(29,111,165,0.08); --ai-border: rgba(29,111,165,0.15);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.6}
        .container{max-width:960px;margin:40px auto;padding:0 24px}
        .loader{text-align:center;padding:40px 20px}
        .loader-title{font-size:18px;font-weight:700;margin-bottom:12px}
        .loader-desc{font-size:13px;color:var(--text-secondary);margin-bottom:16px}
        .loader-or{font-size:12px;color:var(--text-muted);margin:12px 0}
        .loader-samples{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
        .loader-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text-secondary);transition:all var(--transition)}
        .loader-btn:hover{border-color:var(--ai-accent);color:var(--ai-accent)}
        .hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px 24px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:var(--shadow-md)}
        .hero::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ai-accent)}
        .hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .hero-title{display:flex;align-items:center;gap:8px}
        .hero-icon{width:22px;height:22px;border-radius:4px;background:var(--ai-accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
        .hero-title h2{font-size:15px;font-weight:700}
        .hero-meta{font-size:10px;color:var(--text-muted);display:flex;gap:10px;align-items:center}
        .model-tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--ai-accent-muted);color:var(--ai-accent)}
        .hero-main{display:flex;gap:24px;align-items:flex-start;margin-bottom:20px}
        .score-block{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px}
        .score-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800}
        .score-A,.score-B{background:var(--accent-light);color:var(--accent);border:3px solid var(--accent)}
        .score-C{background:#fff8e1;color:#b8860b;border:3px solid #b8860b}
        .score-D,.score-E{background:#fde8e8;color:var(--danger);border:3px solid var(--danger)}
        .score-trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
        .trend-improving{background:rgba(45,90,39,0.08);color:var(--accent)}
        .trend-stable{background:var(--surface-sunken);color:var(--text-secondary)}
        .trend-declining{background:rgba(185,28,28,0.08);color:var(--danger)}
        .hero-summary{flex:1}
        .hero-summary-text{font-size:15px;font-weight:500;line-height:1.75;margin-bottom:12px}
        .tags{display:flex;flex-wrap:wrap;gap:6px}
        .tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;line-height:1.4}
        .tag-good{background:var(--accent-light);color:var(--accent)}
        .tag-bad{background:rgba(185,28,28,0.06);color:#9B2C2C}
        .analysis-box{font-size:12px;line-height:1.7;color:var(--text-secondary);padding:10px 14px;background:var(--surface-elevated);border-radius:var(--radius-sm);border-left:3px solid var(--border);margin-bottom:16px}
        .top-action{background:var(--ai-accent-light);border:1px solid var(--ai-border);border-radius:var(--radius-md);padding:12px 16px}
        .top-action-top{display:flex;align-items:flex-start;gap:10px}
        .badge{width:22px;height:22px;border-radius:50%;background:var(--ai-accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .top-action-body{flex:1}
        .top-action-title{font-size:13px;font-weight:600;margin-bottom:2px}
        .top-action-rationale{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:4px}
        .toggle{font-size:11px;color:var(--ai-accent);cursor:pointer;margin-top:6px;display:inline-flex;align-items:center;gap:4px;font-weight:500}
        .toggle:hover{text-decoration:underline}
        .collapsible{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--ai-border)}
        .collapsible.open{display:block}
        .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;color:var(--text-muted);margin-bottom:3px;margin-top:6px}
        .lbl:first-child{margin-top:0}
        .txt{font-size:12px;color:var(--text-secondary);line-height:1.65;margin-bottom:4px}
        .divider{display:flex;align-items:center;gap:12px;margin-bottom:14px}
        .divider-line{flex:1;height:1px;background:var(--border)}
        .divider-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
        .card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-md);padding:14px 16px}
        .card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;color:var(--text-muted);margin-bottom:8px}
        .f-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
        .f-label{font-size:10px;font-weight:600;width:32px;flex-shrink:0;color:var(--text-muted)}
        .f-label.opt{color:var(--accent)}.f-label.pes{color:var(--danger)}
        .f-value{font-size:12px;color:var(--text-secondary);line-height:1.5}
        .sep{border-top:1px solid var(--border-light);margin-top:8px;padding-top:8px}
        .risk{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:var(--text-secondary);line-height:1.6;padding:4px 0}
        .risk-icon{color:var(--danger);font-size:11px;flex-shrink:0;margin-top:2px}
        .act-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface-elevated);border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition);margin-bottom:4px}
        .act-item:hover{background:var(--surface-sunken)}
        .act-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:#fff}
        .act-num.n2{background:var(--accent)}.act-num.n3{background:var(--text-muted)}.act-num.n4{background:#8B7355}.act-num.n5{background:#6B6560}
        .act-body{flex:1}.act-title{font-size:12px;font-weight:600}.act-cat{font-size:10px;color:var(--text-muted)}
        .act-rationale{font-size:11px;color:var(--text-muted);line-height:1.5;margin-top:4px}
        .act-chevron{font-size:10px;color:var(--text-muted);margin-top:4px;transition:transform 200ms ease}
        .act-item.open .act-chevron{transform:rotate(90deg)}
        .act-extra{display:none;padding:8px 12px 10px 42px;font-size:12px;color:var(--text-secondary);line-height:1.65;background:var(--surface-elevated);border-radius:0 0 var(--radius-sm) var(--radius-sm);margin-top:-2px;margin-bottom:4px}
        .act-item.open+.act-extra{display:block}
        .review{font-size:11px;color:var(--text-muted);line-height:1.7;padding:10px 14px;background:var(--surface-elevated);border-radius:var(--radius-sm);border-left:3px solid var(--border)}
        .review strong{color:var(--text-secondary)}
        @media(max-width:640px){.container{padding:0 16px;margin:20px auto}.hero{padding:20px}.hero-main{flex-direction:column}.hero-top{flex-direction:column;gap:6px;align-items:flex-start}.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <div id="loader" class="loader">
            <div class="loader-title">AI分析ビューア</div>
            <div class="loader-desc">結果JSONファイルを選択するか、サンプルを読み込んでください</div>
            <div><input type="file" accept=".json" id="fileInput"></div>
            <div class="loader-or">または</div>
            <div class="loader-samples" id="samples"></div>
        </div>
        <div id="result"></div>
    </div>
<script>
const SAMPLES = [
    { label: 'qwen3.5 v4', file: 'data/results/qwen3.5_v4_20260405_002832.json' },
    { label: 'qwen3.5 v6b', file: 'data/results/qwen3.5_v6b_20260405_024705.json' },
    { label: 'gemma4 v7', file: 'data/results/gemma4_v7_20260405_024211.json' },
    { label: 'gemma4 v6', file: 'data/results/gemma4_v6_20260405_023343.json' },
];

const $ = id => document.getElementById(id);
const el = (tag, cls, text) => { const e = document.createElement(tag); if (cls) e.className = cls; if (text) e.textContent = text; return e; };

document.addEventListener('DOMContentLoaded', () => {
    SAMPLES.forEach(s => {
        const btn = el('button', 'loader-btn', s.label);
        btn.addEventListener('click', () => fetch(s.file).then(r => r.json()).then(render));
        $('samples').appendChild(btn);
    });
    $('fileInput').addEventListener('change', e => {
        const reader = new FileReader();
        reader.onload = ev => render(JSON.parse(ev.target.result));
        reader.readAsText(e.target.files[0]);
    });
});

function render(data) {
    const te = data.team_evaluation || {};
    const ol = data.outlook || {};
    const actions = data.recommended_actions || [];
    const meta = data.meta || {};
    const score = te.score || '?';
    const trend = te.trend || 'stable';
    const trendText = trend === 'improving' ? '\u25B2 改善傾向' : trend === 'declining' ? '\u25BC 悪化傾向' : '\u25CF 安定';

    $('loader').style.display = 'none';
    const root = $('result');
    root.textContent = '';

    // Hero
    const hero = el('div', 'hero');

    const heroTop = el('div', 'hero-top');
    const titleWrap = el('div', 'hero-title');
    const icon = el('div', 'hero-icon', '\u25C6');
    titleWrap.appendChild(icon);
    titleWrap.appendChild(el('h2', null, 'AI\u5206\u6790'));
    heroTop.appendChild(titleWrap);
    const metaWrap = el('div', 'hero-meta');
    metaWrap.appendChild(el('span', 'model-tag', meta.model || ''));
    metaWrap.appendChild(el('span', null, (meta.generated_at || '').slice(0, 10)));
    metaWrap.appendChild(el('span', null, meta.analysis_period || ''));
    heroTop.appendChild(metaWrap);
    hero.appendChild(heroTop);

    const heroMain = el('div', 'hero-main');
    const scoreBlock = el('div', 'score-block');
    const scoreCircle = el('div', 'score-circle score-' + score, score);
    scoreBlock.appendChild(scoreCircle);
    const scoreTrend = el('div', 'score-trend trend-' + trend, trendText);
    scoreBlock.appendChild(scoreTrend);
    heroMain.appendChild(scoreBlock);

    const summaryWrap = el('div', 'hero-summary');
    summaryWrap.appendChild(el('div', 'hero-summary-text', te.summary || ''));
    const tags = el('div', 'tags');
    (te.strengths || []).forEach(s => tags.appendChild(el('span', 'tag tag-good', s)));
    (te.weaknesses || []).forEach(w => tags.appendChild(el('span', 'tag tag-bad', w)));
    summaryWrap.appendChild(tags);
    heroMain.appendChild(summaryWrap);
    hero.appendChild(heroMain);

    if (te.analysis) {
        hero.appendChild(el('div', 'analysis-box', te.analysis));
    }

    // Top action
    const topAction = actions[0];
    if (topAction) {
        const actionBox = el('div', 'top-action');
        const actionTop = el('div', 'top-action-top');
        actionTop.appendChild(el('div', 'badge', '1'));
        const actionBody = el('div', 'top-action-body');
        actionBody.appendChild(el('div', 'top-action-title', topAction.title || ''));
        actionBody.appendChild(el('div', 'top-action-rationale', topAction.rationale || ''));
        const toggle = el('div', 'toggle', '\u5177\u4F53\u7684\u306A\u30A2\u30AF\u30B7\u30E7\u30F3\u3068\u52B9\u679C \u25BE');
        const detail = el('div', 'collapsible');
        toggle.addEventListener('click', () => detail.classList.toggle('open'));
        actionBody.appendChild(toggle);

        detail.appendChild(el('div', 'lbl', '\u3084\u308B\u3053\u3068'));
        detail.appendChild(el('div', 'txt', topAction.action_summary || ''));
        if (topAction.action_steps && topAction.action_steps.length) {
            detail.appendChild(el('div', 'lbl', '\u5177\u4F53\u7684\u30B9\u30C6\u30C3\u30D7'));
            topAction.action_steps.forEach(s => detail.appendChild(el('div', 'txt', '\u2192 ' + s)));
        }
        detail.appendChild(el('div', 'lbl', '\u671F\u5F85\u52B9\u679C'));
        detail.appendChild(el('div', 'txt', topAction.expected_effect || ''));
        actionBody.appendChild(detail);
        actionTop.appendChild(actionBody);
        actionBox.appendChild(actionTop);
        hero.appendChild(actionBox);
    }
    root.appendChild(hero);

    // Divider
    const divider = el('div', 'divider');
    divider.appendChild(el('div', 'divider-line'));
    divider.appendChild(el('div', 'divider-label', '\u5206\u6790\u8A73\u7D30'));
    divider.appendChild(el('div', 'divider-line'));
    root.appendChild(divider);

    // Detail grid
    const grid = el('div', 'grid');

    // Forecast card
    const forecastCard = el('div', 'card');
    forecastCard.appendChild(el('div', 'card-title', '\u5B8C\u4E86\u898B\u8FBC\u307F'));
    (ol.version_forecasts || []).forEach(vf => {
        forecastCard.appendChild(el('div', 'txt', vf.version || ''));
        [['opt', '\u697D\u89B3', vf.optimistic], [null, '\u73FE\u5B9F', vf.realistic], ['pes', '\u60B2\u89B3', vf.pessimistic]].forEach(([cls, label, val]) => {
            const row = el('div', 'f-row');
            row.appendChild(el('div', 'f-label' + (cls ? ' ' + cls : ''), label));
            row.appendChild(el('div', 'f-value', val || ''));
            forecastCard.appendChild(row);
        });
        if (vf.key_risk) {
            const riskEl = el('div', 'risk');
            riskEl.appendChild(el('span', 'risk-icon', '\u26A0'));
            riskEl.appendChild(el('span', null, vf.key_risk));
            forecastCard.appendChild(riskEl);
        }
    });
    if (ol.accuracy_forecast) {
        const sep = el('div', 'sep');
        const txt = el('div', 'txt');
        const strong = el('strong', null, '\u7CBE\u5EA6\u4E88\u6E2C: ');
        txt.appendChild(strong);
        txt.appendChild(document.createTextNode(ol.accuracy_forecast));
        sep.appendChild(txt);
        forecastCard.appendChild(sep);
    }
    if (ol.resource_risks && ol.resource_risks.length) {
        const sep = el('div', 'sep');
        ol.resource_risks.forEach(r => {
            const riskEl = el('div', 'risk');
            riskEl.appendChild(el('span', 'risk-icon', '\u26A0'));
            riskEl.appendChild(el('span', null, r));
            sep.appendChild(riskEl);
        });
        forecastCard.appendChild(sep);
    }
    grid.appendChild(forecastCard);

    // Other actions card
    const actionsCard = el('div', 'card');
    actionsCard.appendChild(el('div', 'card-title', '\u305D\u306E\u4ED6\u306E\u63A8\u5968\u30A2\u30AF\u30B7\u30E7\u30F3'));
    actions.slice(1).forEach((a, i) => {
        const n = i + 2;
        const numCls = 'act-num n' + Math.min(n, 5);
        const item = el('div', 'act-item');
        item.appendChild(el('div', numCls, String(n)));
        const body = el('div', 'act-body');
        body.appendChild(el('div', 'act-title', a.title || ''));
        body.appendChild(el('div', 'act-cat', a.category || ''));
        body.appendChild(el('div', 'act-rationale', a.rationale || ''));
        item.appendChild(body);
        item.appendChild(el('div', 'act-chevron', '\u25B6'));
        item.addEventListener('click', () => item.classList.toggle('open'));
        actionsCard.appendChild(item);

        const extra = el('div', 'act-extra');
        extra.appendChild(el('div', 'lbl', '\u3084\u308B\u3053\u3068'));
        extra.appendChild(el('div', 'txt', a.action_summary || ''));
        if (a.action_steps && a.action_steps.length) {
            extra.appendChild(el('div', 'lbl', '\u5177\u4F53\u7684\u30B9\u30C6\u30C3\u30D7'));
            a.action_steps.forEach(s => extra.appendChild(el('div', 'txt', '\u2192 ' + s)));
        }
        extra.appendChild(el('div', 'lbl', '\u671F\u5F85\u52B9\u679C'));
        extra.appendChild(el('div', 'txt', a.expected_effect || ''));
        actionsCard.appendChild(extra);
    });
    grid.appendChild(actionsCard);
    root.appendChild(grid);

    // Review focus
    const review = el('div', 'review');
    review.appendChild(el('strong', null, '\u6B21\u56DE\u306E\u6CE8\u8996\u30DD\u30A4\u30F3\u30C8: '));
    review.appendChild(document.createTextNode(data.next_review_focus || ''));
    root.appendChild(review);

    // Reload button
    const btnWrap = el('div', null);
    btnWrap.style.textAlign = 'center';
    btnWrap.style.marginTop = '20px';
    const btn = el('button', 'loader-btn', '\u5225\u306E\u30D5\u30A1\u30A4\u30EB\u3092\u8AAD\u307F\u8FBC\u3080');
    btn.addEventListener('click', () => location.reload());
    btnWrap.appendChild(btn);
    root.appendChild(btnWrap);
}
</script>
</body>
</html>
