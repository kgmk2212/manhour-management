# CI: 公開前のチェック。「真っ白画面の公開」を PR / push の段階で弾く。
#
#   checks (レベル1): 依存パッケージなし・Node 標準機能のみ。
#                     構文チェック(node --check) と index.html の参照実在チェック。
#   lint   (レベル2): ESLint(no-undef 中心)。"構文は正しいが未定義参照" 型の事故
#                     （例: storage.js が state.js に無い変数を参照して初期化が落ち
#                     全画面が白紙化）を静的に検出する。開発用依存(eslint)を使う。
#
# checks は依存ゼロを維持し、npm を使うのは lint ジョブだけに閉じている。
# 拡張の全体像は docs/CICD_ROADMAP.md を参照。
name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - experiment/ui-scaling

permissions:
  contents: read

# 同じ ref への新しい push が来たら、進行中の古い実行はキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      # js/ 配下の自作 JS をすべて構文チェックする。
      # ES Modules なので、CommonJS 誤判定を避けるため一時的に .mjs として検査する。
      # （lib/ は外部同梱ライブラリのため対象外）
      - name: JS 構文チェック
        run: |
          tmp="$(mktemp -d)"
          fail=0
          count=0
          while IFS= read -r f; do
            count=$((count + 1))
            cp "$f" "$tmp/check.mjs"
            if ! node --check "$tmp/check.mjs" 2> "$tmp/err"; then
              echo "::error file=$f::構文エラー: $(head -1 "$tmp/err")"
              fail=1
            fi
          done < <(find js -name '*.js')
          rm -rf "$tmp"
          echo "構文チェック: $count ファイル"
          if [ "$fail" = "1" ]; then
            echo "構文エラーが見つかりました。" >&2
            exit 1
          fi
          echo "全ファイル OK"

      # index.html がローカル参照する script/link のファイルが実在するか確認する。
      # （http(s):// や // や #、data: で始まる外部参照は対象外）
      - name: index.html 参照ファイルの実在チェック
        run: |
          fail=0
          checked=0
          while IFS= read -r ref; do
            case "$ref" in
              http://*|https://*|//*|"#"*|data:*|mailto:*) continue ;;
            esac
            # クエリ・アンカーを除去
            path="${ref%%\?*}"
            path="${path%%#*}"
            [ -z "$path" ] && continue
            checked=$((checked + 1))
            if [ ! -f "$path" ]; then
              echo "::error file=index.html::参照先が存在しません: $path"
              fail=1
            fi
          done < <(grep -oE '(src|href)="[^"]+"' index.html | sed -E 's/^(src|href)="//; s/"$//' | sort -u)
          echo "参照チェック: $checked 件"
          if [ "$fail" = "1" ]; then
            echo "参照切れが見つかりました。" >&2
            exit 1
          fi
          echo "参照切れなし"

  # ESLint（レベル2）: "構文は正しいが未定義参照" 型を静的検出する。
  # 既存の checks（依存ゼロ）とは分離し、開発用依存を使うのはこのジョブだけに閉じる。
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: 依存インストール（eslint）
        run: npm ci

      - name: ESLint（no-undef 中心の静的検出）
        run: npm run lint
