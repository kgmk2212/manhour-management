name: test

# 特性テスト（tests/・node:test）を experiment/ui-scaling への push ごとに実行する。
# アプリ本体はビルド不要の素のJSなので、Node のセットアップだけで走る。
on:
  push:
    branches: ["experiment/ui-scaling"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --test
